 SAH_timeline.1.t: "The Timeline Shatters"
 SAH_timeline.1.d: "Historians will forever look back at this moment as the turning point of the century. The rigid, expected path of geopolitical relations has violently derailed. Traditional alliances are fracturing, old certainties are dead, and the nations of the world are now scrambling to react to a completely unprecedented reality.

There is no historical precedent for what comes next."
 SAH_timeline.1.a: "We are in uncharted waters now."
 
 SAH_timeline_shattered_tt: "§RThe Historical Mode locks have been broken.§!

The AI can now dynamically pursue Alternative History paths in response to global events."
